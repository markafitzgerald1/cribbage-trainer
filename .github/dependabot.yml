version: 2

multi-ecosystem-groups:
  playwright-sync:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      npm-all:
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0 <=10.4.0"]
      # Bounded to the current release (not >=7) so the ignore ages out and
      # prompts a periodic compatibility re-check, matching the eslint entry.
      # Blocked by @typescript-eslint peer range (ERESOLVE in PR #662).
      - dependency-name: "typescript"
        versions: [">=7.0.0 <=7.0.2"]
      - dependency-name: "playwright"
      - dependency-name: "@playwright/test"

  - package-ecosystem: "npm"
    directory: "/"
    multi-ecosystem-group: "playwright-sync"
    patterns:
      - "playwright"
      - "@playwright/test"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "playwright"

  - package-ecosystem: "docker"
    directory: "/"
    multi-ecosystem-group: "playwright-sync"
    patterns:
      - "playwright"
