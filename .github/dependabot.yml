version: 2

multi-ecosystem-groups:
  playwright-sync:
    schedule:
      interval: "daily"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      npm-all:
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0 <=10.4.0"]
      - dependency-name: "playwright"
      - dependency-name: "@playwright/test"

  - package-ecosystem: "npm"
    directory: "/"
    multi-ecosystem-group: "playwright-sync"
    patterns:
      - "playwright"
      - "@playwright/test"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "playwright"

  - package-ecosystem: "docker"
    directory: "/"
    multi-ecosystem-group: "playwright-sync"
    patterns:
      - "playwright"
